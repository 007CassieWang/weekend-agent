  group_fit: 10
  availability_risk: 15

# 旧字段兼容说明：建议尽快让代码改读 scoring_profiles。
legacy_field_mapping:
  child_friendly: "仅在 family_with_children 场景启用"
  diet_friendly: "仅在 health_diet 或用户明确提到减脂/清淡/控糖时启用"
  group_fit: "在朋友聚会、多人同行、家庭场景启用"
  booking_risk: "统一改名为 availability_risk"

# ==================== 追问规则 ====================
clarification_rules:
  ask_if_missing:
    - transportation
    - location
    - date_or_time_window
    - people_count

  # 以下信息缺失时用默认或中性值，不要强行补成亲子/减脂场景
  do_not_ask_if_missing:
    - child_age
    - diet_goal
    - exact_start_time
    - restaurant_type
    - exact_activity_type
    - companion_identity

  default_when_missing:
    exact_start_time: "14:00"
    duration_hours: 4
    budget_level: "medium"
    max_drive_minutes: 30
    companions: "unknown"
    child_age: null
    diet_goal: "none"

  # 仅当用户表达模糊且会影响方案质量时追问
  conditional_questions:
    missing_transportation: "你怎么过去？自驾、地铁公交、打车还是骑行步行？"
    missing_people_count: "这次大概几个人一起？"
    missing_location: "你希望从哪里出发，或者我先按默认位置规划？"
    ambiguous_activity_preference: "你更想偏室内放松、户外走走，还是吃饭聊天？"

# ==================== 执行级别配置 ====================
execution_level:
  available_modes:
    - only_recommend
    - plan_then_confirm
    - mock_execute
  default_mode: "mock_execute"
  require_user_confirmation_before_booking: true
  allow_mock_booking: true
  allow_mock_order: true
  allow_mock_send_message: true
  real_booking_allowed: false
  real_order_allowed: false
  real_payment_allowed: false
  real_message_allowed: false

# ==================== 异常兜底策略：按约束类型兜底，不按单一画像兜底 ====================
failure_fallbacks:
  unavailable: "选择同区域、同预算、同类型且可预约的备选项"
  route_too_far: "缩小搜索半径，优先推荐 30 分钟车程内的活动和餐厅"
  time_conflict: "压缩非核心环节或减少一个活动点，保证时间线可执行"
  over_budget: "替换为同类型但人均价格更低的选项"
  poor_weather: "优先替换为室内活动或商场综合体方案"
  group_capacity_insufficient: "替换为适合当前人数的活动或餐厅"
  child_unfriendly: "仅当儿童约束被激活时，替换为儿童友好方案"
  diet_unfriendly: "仅当健康饮食约束被激活时，替换为更清淡、低卡或健康餐选项"
  accessibility_unfriendly: "仅当无障碍约束被激活时，替换为少步行、可停车、无障碍地点"
  ultimate_fallback: "推荐近距离商场综合体方案，组合餐饮、休闲、购物或轻娱乐，降低路线和预约风险"

