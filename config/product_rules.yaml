    friends_social:
      label: "朋友聚会"
      keywords: ["朋友", "同学", "同事", "聚会", "一起玩", "多人", "局"]
      activated_constraints: ["group_capacity", "social_interaction"]
      scoring_profile: "friends_social"

    solo_relax:
