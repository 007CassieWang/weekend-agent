      activated_constraints: ["diet_match"]
      scoring_profile: "health_diet"

    active_outdoor:
      label: "户外运动"
      keywords: ["运动", "徒步", "骑行", "爬山", "露营", "跑步", "户外"]
      activated_constraints: ["weather_check", "physical_load_match"]
      scoring_profile: "active_outdoor"

    culture_experience:
      label: "文化体验"
      keywords: ["展览", "博物馆", "艺术", "演出", "音乐剧", "市集", "手作"]
      activated_constraints: ["interest_match"]
      scoring_profile: "culture_experience"

# ==================== 硬约束与软偏好 ====================
constraint_rules:
  # 硬约束：不满足时优先过滤或强烈降权
  hard_constraints:
    max_drive_minutes:
      enabled_by_default: true
      fallback: "缩小搜索半径，优先推荐近距离商圈或综合体"
    reservation_required:
      enabled_by_default: false
      fallback: "改为无需预约或可现场进入的活动"
    child_safety:
      enabled_when_context_contains: "family_with_children"
      trigger_keywords: ["孩子", "小孩", "宝宝", "亲子", "儿童"]
      ask_optional_if_missing: "child_age"
      fallback: "剔除不适合儿童的活动或餐厅"
    accessibility:
      enabled_when_slot_true: "accessibility_need"
      trigger_keywords: ["无障碍", "轮椅", "行动不便", "拐杖"]
      fallback: "优先选择无障碍、少步行、可停车的地点"
    pet_friendly:
      enabled_when_slot_true: "pet"
      fallback: "只保留明确允许宠物进入的场所"
    allergy:
      enabled_when_slot_non_empty: "allergy"
      fallback: "剔除含过敏原风险的餐厅"
    elder_mobility:
      enabled_when_context_contains: "family_with_elderly"
      fallback: "优先少步行、低噪声、可停车/可落客地点；仅在明确无障碍需求时强制 accessibility"

  # 软偏好：不直接过滤，用于评分排序
  soft_preferences:
    budget_level:
      description: "价格与用户预算等级的匹配程度"
    activity_preference:
      description: "活动类型与用户兴趣偏好的匹配程度"
    food_preference:
      description: "餐厅类型与用户口味偏好的匹配程度"
    atmosphere:
      description: "热闹、安静、浪漫、亲子、社交等氛围匹配"
    intensity:
      description: "运动强度与同行人身体状态匹配"

