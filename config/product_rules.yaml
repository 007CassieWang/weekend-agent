# ==================== 输出策略 ====================
output_policy:
  generate_candidate_count: 3
  explain_why_not_selected: true
  show_score_breakdown: true
  show_triggered_constraints: true
  show_assumptions_used: true
  avoid_over_personalized_assumptions: true

# ==================== LLM 配置 ====================
llm_config:
  parser:
    provider: "deepseek"
    model: "deepseek-chat"
    enabled: true
    fallback_to_mock: true
  temperature: 0.1
  max_tokens: 2000
  timeout_seconds: 8
