# ==================== 数据源配置：只定义 adapter 和字段映射，不默认下载大文件 ====================
data_sources:
  policy:
    no_crawling: true
    respect_platform_terms: true
    default_download_large_files: false
    real_payment_or_real_message: false
  adapters:
    meituan_dianping_asap:
      name: "Meituan-Dianping ASAP"
      purpose: "中文大众点评餐厅评论方面情感，扩展 food_quality/service_quality/atmosphere 评估词典"
      access_mode: "offline_dataset_if_licensed"
      default_enabled: false
      field_mapping:
        review_text: "comment"
        aspect: "aspect_category"
        sentiment: "sentiment_label"
        poi_category: "restaurant_category"
    asap_sent_triplet:
      name: "ASAP_SENT / ASAP-Triplet"
      purpose: "方面情感/三元组抽取，支持从评论抽取菜品、服务、环境、排队风险"
      access_mode: "offline_dataset_if_licensed"
      default_enabled: false
      field_mapping:
        text: "sentence"
        aspect: "target"
        opinion: "opinion"
        sentiment: "polarity"
    trd_meituan_takeout:
      name: "TRD Meituan Takeout Dataset"
      purpose: "外卖推荐/用户-商户交互评估；graph.bin 体积大，默认不下载"
      access_mode: "offline_dataset_if_licensed"
      default_enabled: false
      skip_files_by_default: ["graph.bin"]
      field_mapping:
        user_id: "user_id"
        item_id: "shop_or_item_id"
        category: "poi_category"
        interaction: "order_or_click"
    crosswoz:
      name: "CrossWOZ"
      purpose: "中文餐馆/景点/酒店/地铁/出租多领域对话，用于槽位抽取与追问评估"
      access_mode: "offline_dataset"
      default_enabled: false
      field_mapping:
        domain: "domain"
        intent: "dialog_act"
        slots: "belief_state"
        user_utterance: "user"
        system_response: "system"
    vitabench:
      name: "VitaBench"
      purpose: "生活服务 Agent 工具调用与任务评测，评估 plan/booking/order/message 的 mock 执行链"
      access_mode: "benchmark_if_available"
      default_enabled: false
      field_mapping:
        task: "instruction"
        tool_calls: "expected_tool_calls"
        success_criteria: "rubric"
    amap_poi_api:
      name: "Amap POI API"
      purpose: "真实中国 POI 召回、地理编码、距离和营业状态查询"
      access_mode: "official_api_key_required"
      default_enabled: false
      field_mapping:
        poi_id: "id"
        name: "name"
        category: "type"
        address: "address"
        coordinates: "location"
        business_area: "business_area"
    meituan_union_api:
      name: "Meituan Union API"
      purpose: "到店/到家商品、团购券、榜单主题查询；仅使用官方授权接口"
      access_mode: "official_api_key_required"
      default_enabled: false
      field_mapping:
        deal_id: "deal_id"
        poi_id: "poi_id"
        title: "title"
        price: "sale_price"
        coupon: "coupon_info"
        category: "category"
    foursquare_fsq_os_places:
      name: "Foursquare FSQ OS Places"
      purpose: "全球 POI schema 备用，用于补齐类目层级与开放地理实体"
      access_mode: "open_dataset"
      default_enabled: false
      field_mapping:
        poi_id: "fsq_place_id"
        name: "name"
        category: "categories"
        coordinates: "latitude_longitude"
        address: "address"
    osm_geofabrik_china:
      name: "OpenStreetMap/Geofabrik China"
      purpose: "开源地理基础数据备用，用于道路、商圈、公共设施、无障碍标签补充"
      access_mode: "open_dataset"
      default_enabled: false
      field_mapping:
        osm_id: "id"
        name: "name"
        category: "tags"
        coordinates: "geometry"
        accessibility: "wheelchair"

