# 周末/闲时活动规划 Agent - 泛化版产品规则配置
# 目标：不要把 Agent 固定成“老婆+孩子+减脂”的家庭场景，而是先识别场景，再动态启用约束和评分权重。
# 产品经理优先修改本文件；如 scoring.py/agent_harness.py 已写死 child_friendly/diet_friendly，需要同步改成读取 scoring_profiles 与 activated_constraints。

# ==================== 产品定位 ====================
product_profile:
  product_name: "闲时活动规划 Agent"
  target_user: "临时产生空闲时间、希望快速安排本地活动的用户"
  default_scenario: "本地短时活动规划"
  product_positioning: "根据用户的时间、地点、同行人、预算、偏好和特殊约束，生成可执行的本地活动方案，并支持 Mock 预约、下单和消息发送。"
  design_principle:
    - "用户画像不预设家庭结构，先识别场景，再启用对应规则"
    - "儿童、老人、宠物、减脂、无障碍等都属于可选约束，不作为全局默认"
    - "硬约束优先过滤，软偏好用于评分排序"
    - "缺失信息优先使用中性默认值，避免强行补成家庭/亲子场景"

# ==================== 默认值配置：全部保持中性 ====================
defaults:
  start_time: "14:00"
  duration_hours: 4
  max_drive_minutes: 30
  budget_level: "medium"
  default_location: "mock_home_location"
  default_transportation: "driving"
  default_execution_mode: "plan_then_confirm"

  # 通勤方式选项：影响 max_drive_minutes 解读、路线规划、停车/地铁偏好
  transportation_options:
    driving:
      label: "自驾"
      auto_context_modifiers: ["parking_needed"]
      affects: ["max_drive_minutes", "route_smoothness", "parking_fit"]
    transit:
      label: "地铁/公交"
      auto_context_modifiers: ["near_subway"]
      affects: ["max_drive_minutes", "route_smoothness", "subway_fit"]
    taxi:
      label: "打车"
      auto_context_modifiers: []
      affects: ["max_drive_minutes", "route_smoothness"]
    bike_walk:
      label: "骑行/步行"
      auto_context_modifiers: ["low_walking"]
      affects: ["max_drive_minutes", "route_smoothness", "distance_fit"]
      note: "骑行/步行模式下 max_drive_minutes 解读为最大骑行/步行时间，活动搜索半径大幅缩小"

  # 不要默认有孩子、老婆、家庭；缺失时保持 unknown/null
  people_count: null
  companions: "unknown"
  child_age: null
  elder_age: null
  pet: false
  diet_goal: "none"
  accessibility_need: false
  activity_intensity: "medium"
  indoor_preference: "no_preference"

  budget_levels:
    low:
      label: "经济型"
      price_per_person_range: [0, 100]
    medium:
      label: "中等消费"
      price_per_person_range: [100, 300]
    high:
      label: "高端消费"
      price_per_person_range: [300, 1000]

# ==================== 槽位分类 ====================
slot_schema:
  # 核心槽位：大多数场景都需要。transportation 优先级最高，影响行程路线规划。
  core_slots:
    - transportation
    - time_window
    - start_time
    - duration_hours
    - location
    - people_count
    - companions
    - max_drive_minutes
    - budget_level
    - activity_preference
    - food_preference
    - execution_intent

  # 可选约束：只有用户明确提到或场景识别命中时才启用
  optional_constraint_slots:
    - child_age
    - elder_age
    - pet
    - diet_goal
    - allergy
    - accessibility_need
    - weather_sensitivity
    - indoor_preference
    - activity_intensity
    - noise_preference
    - parking_need
    - alcohol_avoidance
    - photo_spot_preference

  # 追问优先级：只追问会显著影响可执行性的槽位
  clarification_priority:
    high:
      - transportation
      - location
      - date_or_time_window
      - people_count
    medium:
      - budget_level
      - max_drive_minutes
      - activity_preference
    low:
      - exact_restaurant_type
      - exact_activity_type
      - gift_preference

# ==================== 场景识别：multi-label 输出，旧 scenario_type 仅作兼容 ====================
scenario_detection:
  default_scenario_type: "general_leisure"
  confidence_threshold: 0.55
  mode: "multi_label"
  output_schema:
    companion_context:
      allowed_values: ["solo", "couple", "family_with_children", "family_with_elderly", "friends", "colleagues", "pet", "unknown"]
      multiple: true
      default: ["unknown"]
      note: "老婆孩子应识别为 family_with_children，并在 relation_context 标注 spouse，不能退化为单纯 couple。"
    relation_context:
      allowed_values: ["spouse", "partner", "parent", "child", "friend", "coworker"]
      multiple: true
      default: []
    primary_intent:
      allowed_values: ["meal", "cafe_tea", "culture_experience", "indoor_entertainment", "outdoor_walk", "shopping_mall", "wellness_relax", "nightlife", "parent_child", "short_trip", "time_killing", "mixed_plan"]
      multiple: false
      default: "mixed_plan"
    context_modifiers:
      allowed_values: ["rainy_day", "hot_weather", "cold_weather", "low_budget", "high_budget", "low_energy", "high_energy", "quiet", "lively", "photo_spot", "no_reservation", "parking_needed", "near_subway", "low_walking", "queue_sensitive"]
      multiple: true
      default: []
    hard_constraints:
      allowed_values: ["child_safety", "elder_mobility", "pet_allowed", "allergy_safe", "accessibility", "max_distance", "budget_cap", "time_window"]
      multiple: true
      default: []
    soft_preferences:
      allowed_values: ["atmosphere", "uniqueness", "social_interaction", "service_quality", "food_quality", "place_quality", "coupon_or_discount", "route_smoothness"]
      multiple: true
      default: []

  multi_label_rules:
    companion_context:
      solo:
        keywords: ["一个人", "自己", "独处", "单独", "独自"]
      couple:
        keywords: ["情侣", "约会", "女朋友", "男朋友", "对象", "二人世界"]
        exclude_if_any_context: ["family_with_children"]
      family_with_children:
        keywords: ["孩子", "小孩", "宝宝", "亲子", "儿童", "娃", "儿子", "女儿", "幼儿园", "老婆孩子", "一家三口"]
      family_with_elderly:
        keywords: ["父母", "爸妈", "老人", "长辈", "爷爷", "奶奶", "外公", "外婆"]
      friends:
        keywords: ["朋友", "好友", "哥们", "闺蜜", "兄弟", "同学", "搭子"]
      colleagues:
        keywords: ["同事", "团队", "部门", "客户"]
      pet:
        keywords: ["宠物", "带狗", "带猫", "遛狗", "猫咪", "狗狗", "可带宠", "宠物友好"]
        enabled_when_slot_true: "pet"
    primary_intent:
      meal:
        keywords: ["吃饭", "吃个", "想吃", "晚饭", "餐厅", "美食", "火锅", "烧烤", "日料", "西餐", "夜宵", "粤菜", "本帮菜"]
      cafe_tea:
        keywords: ["咖啡", "茶馆", "奶茶", "下午茶", "甜品"]
      culture_experience:
        keywords: ["展览", "看展", "博物馆", "美术馆", "艺术", "演出", "音乐剧", "Livehouse", "市集", "手作"]
      indoor_entertainment:
        keywords: ["电影院", "电影", "KTV", "剧本杀", "密室", "桌游", "台球", "保龄球", "电玩城"]
      outdoor_walk:
        keywords: ["公园", "城市漫步", "citywalk", "散步", "走走", "骑行", "徒步", "露营", "滨水"]
      shopping_mall:
        keywords: ["商场", "购物中心", "奥莱", "商业街", "步行街", "逛街"]
      wellness_relax:
        keywords: ["SPA", "按摩", "洗浴", "温泉", "瑜伽", "疗愈", "书店", "放松"]
      nightlife:
        keywords: ["夜生活", "酒吧", "夜店", "深夜", "晚上嗨"]
      parent_child:
        keywords: ["亲子", "儿童乐园", "儿童剧", "带娃", "孩子玩", "科技馆"]
      short_trip:
        keywords: ["周边游", "短途", "郊区", "一日游", "半日游"]
      time_killing:
        keywords: ["打发时间", "消磨时间", "待一会", "待两小时", "杀时间"]
    context_modifiers:
      rainy_day: ["下雨", "雨天", "阴雨"]
      hot_weather: ["太热", "高温", "热天", "暴晒"]
      cold_weather: ["太冷", "降温", "冷天"]
      low_budget: ["便宜", "省钱", "低预算", "预算不高", "实惠", "人均100", "100以内", "别太贵", "别太高", "不用太贵"]
      high_budget: ["高端", "预算充足", "精致", "仪式感"]
      low_energy: ["别太累", "不要太累", "不想太累", "低体力", "轻松", "少走路", "懒得动"]
      high_energy: ["运动", "爬山", "徒步", "骑行", "出汗"]
      quiet: ["安静", "清静", "人少", "不吵"]
      lively: ["热闹", "气氛好", "嗨", "好玩"]
      photo_spot: ["拍照", "出片", "打卡", "好看"]
      no_reservation: ["不想预约", "不用预约", "免预约", "说走就走"]
      parking_needed: ["开车", "停车", "好停车", "自驾"]
