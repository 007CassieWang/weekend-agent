cases:
  - case_id: solo_quiet_2h
    input: "一个人周日下午找个安静地方待两小时"
    expected_companion_context: ["solo"]
    expected_primary_intent: "time_killing"
    expected_context_modifiers: ["quiet"]
    expected_hard_constraints: ["time_window"]
    expected_should_ask: ["location"]
    expected_should_not_assume: ["children", "spouse", "pet", "diet_goal"]
    expected_recommendation_style: "安静、低打扰、可短暂停留的咖啡馆/书店/展览，不推荐亲子、家庭、减脂方案"

